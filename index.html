  <style>
    /* Noise texture overlay */
    .bg-noise {
      position: relative;
    }

    .bg-noise::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");

    /* Hide scrollbar for horizontal scrolling areas */

    .no-scrollbar {

    /* Home redesign: smooth anchor scrolling + branded selection */
    html { scroll-behavior: smooth; }
    ::selection { background: #c6f24e; color: #0a0b0d; }

    /* Kinetic marquee (CSS-driven so it can pause under reduced motion) */
    @keyframes tatame-marquee { from { transform: translate3d(0,0,0); } to { transform: translate3d(-50%,0,0); } }
    .animate-marquee { animation: tatame-marquee 32s linear infinite; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .animate-marquee { animation: none; }
    }
  </style>
